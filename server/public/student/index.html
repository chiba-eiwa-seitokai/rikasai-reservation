<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <!-- System designed and developed by 越川颯人 (千葉英和高校生徒会) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梨花祭2026 生徒ダッシュボード</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <script>
        // ===
        console.log('%c梨花祭2026 入場管理システム', 'font-size:16px;font-weight:bold;color:#c0392b;');
        console.log('%c Designed & Developed by 越川颯人 / 千葉英和高校生徒会 (2026)', 'color:#555;');
        // ===
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('Service Worker registered!');
                }).catch(err => {
                    console.log('Service Worker registration failed:', err);
                });
            });
        }
    </script>
    <!-- QRコード生成ライブラリ -->
    <style>
        .tab-bar {
            display: flex;
            background: var(--color-bg);
            border-radius: var(--radius-md);
            padding: 4px;
            margin-bottom: 1.5rem;
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 0.55rem 0;
            border: none;
            border-radius: calc(var(--radius-md) - 4px);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--color-text-sub);
            transition: background 0.2s, color 0.2s;
        }

        .tab-btn.active {
            background: var(--color-primary);
            color: #fff;
        }

        .slot-card {
            background: var(--color-bg);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .slot-info {
            flex: 1;
            text-align: left;
        }

        .slot-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .slot-status {
            font-size: 0.8rem;
        }

        .slot-status.used {
            color: var(--color-error);
        }

        .slot-status.unused {
            color: var(--color-success);
        }

        .btn-copy {
            padding: 0.4rem 0.85rem;
            min-height: 40px;
            font-size: 0.8rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-primary);
            background: transparent;
            color: var(--color-primary);
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-copy:hover {
            background: var(--color-primary);
            color: #fff;
        }

        .btn-copy.copied {
            background: var(--color-success);
            border-color: var(--color-success);
            color: #fff;
        }

        .count-badge {
            display: inline-block;
            background: var(--color-primary);
            color: #fff;
            border-radius: 50px;
            padding: 0.2rem 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        .add-guest-form {
            background: var(--color-bg);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .add-guest-form input {
            width: 100%;
            margin-bottom: 0.75rem;
        }

        /* チケット画像表示用モーダル */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.is-active {
            display: flex;
        }

        .modal-container {
            max-width: 92%;
            max-height: 92vh;
            width: 420px;
            position: relative;
            background: #fff;
            border-radius: var(--radius-md);
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .modal-image {
            display: block;
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
        }

        .modal-footer {
            width: 100%;
            padding: 1rem;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.25rem;
            z-index: 1001;
        }
    </style>
</head>

<body class="landing-page">
    <div class="glass-card slide-up" style="max-width: 500px; margin: 0 auto;">

        <!-- ===== ログイン画面 ===== -->
        <div id="page-login">
            <h1 class="title">梨花祭2026</h1>
            <p class="subtitle">生徒ダッシュボード</p>

            <!-- タブ切り替え -->
            <div class="tab-bar">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ログイン</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">新規登録</button>
            </div>

            <!-- ログインフォーム（メールのみ） -->
            <div id="form-login" class="fade-in">
                <div class="form-group">
                    <label class="form-label" for="login-email">学校メールアドレス</label>
                    <input class="form-input" type="email" id="login-email" placeholder="例: b2026123@biblos.ac.jp"
                        autocomplete="email">
                    <p class="help" style="font-size:0.78rem; color:var(--color-text-sub); margin-top:0.35rem;">先頭のアルファベット（学年の記号 g/r/b など）を忘れずに入力してください。</p>
                </div>
                <p id="login-error" class="help is-danger" style="display:none;"></p>
                <button class="btn btn-primary" style="width:100%;" onclick="sendLoginOtp()">認証コードを送信</button>
            </div>

            <!-- 新規登録フォーム（メール+名前） -->
            <div id="form-register" class="fade-in" style="display:none;">
                <div class="form-group">
                    <label class="form-label" for="reg-email">学校メールアドレス</label>
                    <input class="form-input" type="email" id="reg-email" placeholder="例: b2026123@biblos.ac.jp"
                        autocomplete="email">
                    <p class="help" style="font-size:0.78rem; color:var(--color-text-sub); margin-top:0.35rem;">先頭のアルファベット（学年の記号 g/r/b など）を忘れずに入力してください。番号だけにならないよう注意。</p>
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-name">氏名</label>
                    <input class="form-input" type="text" id="reg-name" placeholder="例: 山田 太郎">
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-grade-class">学年・クラス</label>
                    <select class="form-input" id="reg-grade-class" style="appearance: auto; padding-right: 2rem;">
                        <option value="">選択してください</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="reg-privacy-agree" style="width: 18px; height: 18px; cursor: pointer;">
                    <label for="reg-privacy-agree"
                        style="font-size: 0.9rem; cursor: pointer; color: var(--color-text-main);">
                        <a href="/privacy.html" target="_blank"
                            style="color: var(--color-primary); text-decoration: underline;">プライバシーポリシー</a>に同意する
                    </label>
                </div>
                <p id="register-error" class="help is-danger" style="display:none;"></p>
                <button class="btn btn-primary" style="width:100%;" onclick="sendRegisterOtp()">認証コードを送信</button>
            </div>

            <!-- OTP入力（共通） -->
            <div id="step-otp" class="fade-in" style="display:none;">
                <p style="margin-bottom: 1rem; color: var(--color-text-sub);">
                    <span id="otp-email-display" style="font-weight:700;"></span> に<br>6桁の認証コードを送信しました。
                </p>
                <div class="form-group">
                    <label class="form-label" for="input-otp">認証コード（6桁）</label>
                    <input class="form-input" type="text" id="input-otp" placeholder="123456" maxlength="6"
                        inputmode="numeric" autocomplete="one-time-code">
                </div>
                <p id="otp-error" class="help is-danger" style="display:none;"></p>
                <div style="display:flex; gap:0.75rem;">
                    <button class="btn" style="flex:1; background: var(--color-bg); color: var(--color-text);"
                        onclick="backToForm()">戻る</button>
                    <button class="btn btn-primary" style="flex:2;" onclick="verifyOtp()">ログイン</button>
                </div>
                <p style="text-align:center; margin-top:1rem;">
                    <button id="btn-resend-otp" onclick="resendOtp()" disabled
                        style="background:none; border:none; font-size:0.85rem; padding:8px; cursor:pointer;">メールが届かない場合は再送できます（60秒後）</button>
                </p>
            </div>

            <!-- 処理中インジケーター -->
            <div id="step-loading" style="display:none; text-align:center; padding: 1rem 0;">
                <div class="loader" style="margin: 0 auto 1rem;"></div>
                <p style="color: var(--color-text-sub); font-size:0.9rem;">処理中...</p>
            </div>
        </div>

        <!-- ===== ダッシュボード ===== -->
        <div id="page-dashboard" style="display:none;">
            <div
                style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1.25rem; gap: 1rem;">
                <div style="flex: 1; word-wrap: break-word;">
                    <h1 class="title" style="font-size: 1.4rem; margin:0; text-align: left;">梨花祭2026</h1>
                    <p id="dash-name"
                        style="color: var(--color-text-sub); margin:0; font-size:0.9rem; line-height: 1.4;"></p>
                </div>
                <button class="btn"
                    style="padding: 0.4rem 0.85rem; font-size:0.8rem; background: var(--color-bg); color: var(--color-text-sub); flex-shrink: 0; width: auto;"
                    onclick="logout()">ログアウト</button>
            </div>

            <p class="subtitle" style="text-align:left; margin-bottom: 0.5rem;">招待リンク管理</p>
            <p id="dash-count-label" class="count-badge"></p>

            <div id="slots-container"></div>

            <div id="add-guest-section">
                <div class="add-guest-form">
                    <label class="form-label" for="input-guest-name">ゲストの名前を入力して招待リンクを作成</label>
                    <input class="form-input" type="text" id="input-guest-name" placeholder="例: 鈴木 花子">
                    <p id="add-error" class="help is-danger" style="display:none;"></p>
                    <button class="btn btn-primary" style="width:100%;" id="btn-add-guest"
                        onclick="addGuest()">招待リンクを生成</button>
                </div>
            </div>

            <p id="limit-notice"
                style="display:none; color: var(--color-text-sub); font-size:0.85rem; margin-top:0.5rem;">
                招待枠をすべて使用しました。
            </p>

            <!-- 枠の譲渡受け取りフォーム -->
            <div style="margin-top:1.2rem; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 0.9rem 1rem;">
                <p style="font-size:0.82rem; font-weight:600; color: var(--color-text-sub); margin-bottom:0.5rem;">🔁 枠の譲渡を受け取る</p>
                <div style="display:flex; gap:0.5rem;">
                    <input class="form-input" type="text" id="claim-code-input" placeholder="譲渡コード（例: A1B2C3D4）" style="flex:1; font-size:0.9rem; letter-spacing:0.05em; text-transform:uppercase;">
                    <button class="btn btn-primary" style="width:auto; padding:0 1rem; white-space:nowrap;" onclick="claimSlot()">受け取る</button>
                </div>
                <p id="claim-error" style="display:none; color: var(--color-error); font-size:0.8rem; margin-top:0.4rem;"></p>
            </div>

            <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--color-text-sub);">
                ※ 招待リンクをゲストに送ってください。ゲストはリンクを開くだけで入場QRが表示されます。
            </p>
        </div>

    </div>

    <!-- ゲスト名変更モーダル -->
    <div id="edit-name-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="edit-name-modal-title">
        <div class="modal-container" style="width:360px; padding:1.5rem;">
            <h3 id="edit-name-modal-title" style="margin:0 0 1rem; font-size:1rem; color:var(--color-text);">ゲスト名を変更</h3>
            <input id="edit-name-input" class="form-input" type="text" maxlength="50" placeholder="新しいゲスト名" style="margin-bottom:0.75rem;">
            <p id="edit-name-error" style="color:var(--color-error);font-size:0.82rem;margin-bottom:0.75rem;display:none;"></p>
            <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
                <button class="btn" style="background:var(--color-bg);color:var(--color-text-sub);" onclick="closeEditNameModal()">キャンセル</button>
                <button class="btn btn-primary" id="edit-name-confirm-btn" onclick="confirmEditGuestName()">変更する</button>
            </div>
        </div>
    </div>

    <script>
        let studentToken = localStorage.getItem('student_token') || '';
        let studentEmail = localStorage.getItem('student_email') || '';
        let maxSlots = 3;
        let currentTab = 'login'; // 'login' | 'register'
        let currentMessageTemplate = ''; // テンプレート保存用
        let _editNameSlotId = null;
        let _editNameCurrent = '';

        // ===== 初期化 =====
        window.addEventListener('DOMContentLoaded', () => {
            populateGradeClassOptions();
            if (studentToken) loadDashboard();
        });

        // 学年クラスの選択肢を動的生成
        function populateGradeClassOptions() {
            const select = document.getElementById('reg-grade-class');
            for (let grade = 1; grade <= 3; grade++) {
                for (let cls = 1; cls <= 12; cls++) {
                    const opt = document.createElement('option');
                    opt.value = `${grade}-${cls}`;
                    opt.textContent = `${grade}年${cls}組`;
                    select.appendChild(opt);
                }
                ['E1', 'E2'].forEach(cls => {
                    const opt = document.createElement('option');
                    opt.value = `${grade}-${cls}`;
                    opt.textContent = `${grade}年${cls}組`;
                    select.appendChild(opt);
                });
            }
        }

        // ===== タブ切り替え =====
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
            clearErrors();
        }

        function clearErrors() {
            ['login-error', 'register-error', 'otp-error'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.style.display = 'none'; el.textContent = ''; }
            });
        }

        // ===== ログイン（メールのみ）=====
        async function sendLoginOtp() {
            const email = document.getElementById('login-email').value.trim();
            const errEl = document.getElementById('login-error');
            errEl.style.display = 'none';

            if (!email) {
                errEl.textContent = 'メールアドレスを入力してください。';
                errEl.style.display = 'block';
                return;
            }

            if (!isValidSchoolEmail(email)) {
                errEl.textContent = '学校メールは先頭にアルファベット（学年の記号 g/r/b など）が付きます（例: b2026123@biblos.ac.jp）。番号だけになっていないか確認してください。';
                errEl.style.display = 'block';
                return;
            }

            setLoading(true);
            try {
                const res = await fetch('/api/student/login-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                setLoading(false);

                if (res.ok) {
                    studentEmail = email;
                    document.getElementById('otp-email-display').textContent = email;
                    showOtpStep();
                } else {
                    errEl.textContent = data.message || 'エラーが発生しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                setLoading(false);
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
            }
        }

        // ===== 新規登録（メール+名前）=====
        async function sendRegisterOtp() {
            const email = document.getElementById('reg-email').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const grade_class = document.getElementById('reg-grade-class').value;
            const privacyAgree = document.getElementById('reg-privacy-agree').checked;
            const errEl = document.getElementById('register-error');
            errEl.style.display = 'none';

            if (!email || !name || !grade_class) {
                errEl.textContent = 'メールアドレス、氏名、学年クラスを入力してください。';
                errEl.style.display = 'block';
                return;
            }

            if (!privacyAgree) {
                errEl.textContent = 'プライバシーポリシーへの同意が必要です。';
                errEl.style.display = 'block';
                return;
            }

            if (!isValidSchoolEmail(email)) {
                errEl.textContent = '学校メールは先頭にアルファベット（学年の記号 g/r/b など）が付きます（例: b2026123@biblos.ac.jp）。番号だけになっていないか確認してください。';
                errEl.style.display = 'block';
                return;
            }

            setLoading(true);
            try {
                const res = await fetch('/api/student/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name, grade_class })
                });
                const data = await res.json();
                setLoading(false);

                if (res.ok) {
                    studentEmail = email;
                    document.getElementById('otp-email-display').textContent = email;
                    showOtpStep();
                } else {
                    errEl.textContent = data.message || 'エラーが発生しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                setLoading(false);
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
            }
        }

        function showOtpStep() {
            document.getElementById('form-login').style.display = 'none';
            document.getElementById('form-register').style.display = 'none';
            document.getElementById('tab-bar') && (document.querySelector('.tab-bar').style.display = 'none');
            document.getElementById('step-otp').style.display = 'block';
            startResendCountdown();
        }

        // ===== OTP再送（60秒のクールダウン付き） =====
        let resendTimerId = null;
        function startResendCountdown() {
            const btn = document.getElementById('btn-resend-otp');
            let remain = 60;
            btn.disabled = true;
            btn.style.color = 'var(--color-text-sub)';
            btn.style.textDecoration = 'none';
            btn.textContent = `メールが届かない場合は再送できます（${remain}秒後）`;
            clearInterval(resendTimerId);
            resendTimerId = setInterval(() => {
                remain--;
                if (remain <= 0) {
                    clearInterval(resendTimerId);
                    btn.disabled = false;
                    btn.style.color = 'var(--color-primary)';
                    btn.style.textDecoration = 'underline';
                    btn.textContent = '認証コードを再送する';
                } else {
                    btn.textContent = `メールが届かない場合は再送できます（${remain}秒後）`;
                }
            }, 1000);
        }

        async function resendOtp() {
            const errEl = document.getElementById('otp-error');
            errEl.style.display = 'none';
            const btn = document.getElementById('btn-resend-otp');
            btn.disabled = true;
            try {
                const isRegister = currentTab === 'register';
                const body = isRegister
                    ? { email: studentEmail, name: document.getElementById('reg-name').value.trim(), grade_class: document.getElementById('reg-grade-class').value }
                    : { email: studentEmail };
                const res = await fetch(isRegister ? '/api/student/request-otp' : '/api/student/login-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (res.ok) {
                    showNotification('認証コードを再送しました。メールをご確認ください', 'success');
                    startResendCountdown();
                } else {
                    errEl.textContent = data.message || '再送に失敗しました。';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                }
            } catch (e) {
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
                btn.disabled = false;
            }
        }

        // ===== OTP検証 =====
        async function verifyOtp() {
            const otp = document.getElementById('input-otp').value.trim();
            const errEl = document.getElementById('otp-error');
            errEl.style.display = 'none';

            if (!otp || otp.length !== 6) {
                errEl.textContent = '6桁の認証コードを入力してください。';
                errEl.style.display = 'block';
                return;
            }

            setLoading(true);
            try {
                const res = await fetch('/api/student/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: studentEmail, otp })
                });
                const data = await res.json();
                setLoading(false);

                if (res.ok && data.success) {
                    studentToken = data.token;
                    localStorage.setItem('student_token', studentToken);
                    localStorage.setItem('student_email', studentEmail);
                    loadDashboard();
                } else {
                    errEl.textContent = data.message || '認証に失敗しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                setLoading(false);
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
            }
        }

        // ===== ダッシュボード読み込み =====
        async function loadDashboard() {
            try {
                const res = await fetch('/api/student/dashboard', {
                    headers: { 'Authorization': `Bearer ${studentToken}` }
                });
                if (res.status === 401 || res.status === 403) { logout(); return; }
                const data = await res.json();
                maxSlots = data.maxSlots || 3;

                document.getElementById('page-login').style.display = 'none';
                document.getElementById('page-dashboard').style.display = 'block';
                document.getElementById('dash-name').textContent = `${data.name} さん${data.grade_class ? ' (' + data.grade_class + ')' : ''}`;
                renderSlots(data.slots);
            } catch (e) {
                console.error('ダッシュボード読み込みエラー:', e);
                logout();
            }
        }

        function renderSlots(slots) {
            const container = document.getElementById('slots-container');
            const addSection = document.getElementById('add-guest-section');
            const limitNotice = document.getElementById('limit-notice');
            const countLabel = document.getElementById('dash-count-label');
            const baseUrl = `${location.protocol}//${location.host}`;

            countLabel.textContent = `${slots.length} / ${maxSlots} 枠使用中`;
            container.innerHTML = '';

            if (slots.length === 0) {
                container.innerHTML = '<p style="color: var(--color-text-sub); font-size: 0.9rem; margin-bottom: 1rem;">まだ招待リンクはありません。</p>';
            }

            slots.forEach((slot, i) => {
                const url = `${baseUrl}/?token=${slot.token}`;
                const div = document.createElement('div');
                div.className = 'slot-card';
                div.style.flexDirection = 'column';
                div.style.alignItems = 'stretch';

                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
                        <div class="slot-info">
                            <div class="slot-name">${slot.guest_name ? escHtml(slot.guest_name) + ' 様' : '<span style="color:#f59e0b;">⚠️ 名前未設定</span>'}</div>
                            <div class="slot-status ${slot.used ? 'used' : 'unused'}">
                                ${slot.used ? '✅ 使用済み' : '⏳ 未使用'}
                            </div>
                        </div>
                        ${!slot.used ? `<button class="btn" style="padding: 0.2rem 0.6rem; font-size: 0.75rem; background: var(--color-bg); color: var(--color-text-sub); width:auto;" onclick="editGuestName('${slot.id}', '${escHtml(slot.guest_name)}')">名前変更</button>` : ''}
                    </div>
                    ${!slot.used
                        ? `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
                               <button class="btn-copy" id="copy-btn-${i}" onclick="copyLink('${escHtml(url)}', ${i}, '${escHtml(slot.guest_name)}')">📋 コピー</button>
                               <button class="btn-copy btn-line" style="border:none;" onclick="shareLine('${escHtml(url)}', '${escHtml(slot.guest_name)}')">LINE送る</button>
                           </div>
                           ${slot.transfer_code
                               ? `<div style="margin-top:0.5rem; background:#fef3c7; border:1px solid #f59e0b; border-radius:8px; padding:0.5rem 0.75rem; display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
                                      <span style="font-size:0.78rem; color:#92400e;">譲渡コード：</span>
                                      <strong style="font-size:1rem; letter-spacing:0.1em; color:#78350f;">${slot.transfer_code}</strong>
                                      <button class="btn-copy" style="padding:0.15rem 0.6rem; font-size:0.75rem;" onclick="copyTransferCode('${slot.transfer_code}')">📋 コピー</button>
                                      <button class="btn-copy" style="margin-left:auto; padding:0.15rem 0.6rem; font-size:0.75rem;" onclick="cancelTransfer('${slot.id}')">キャンセル</button>
                                  </div>`
                               : `<button class="btn-copy" style="width:100%; margin-top:0.5rem; background:var(--color-bg); color:#6b7280; border:1px dashed #d1d5db; font-size:0.8rem;" onclick="issueTransfer('${slot.id}')">🔁 譲渡コードを発行</button>`
                           }`
                        : '<div style="background:#f3f4f6; color:#9ca3af; text-align:center; padding:0.5rem; border-radius:8px; font-size:0.8rem;">ご入場ありがとうございました</div>'
                    }
                `;
                container.appendChild(div);
            });

            if (slots.length >= maxSlots) {
                addSection.style.display = 'none';
                limitNotice.style.display = 'block';
            } else {
                addSection.style.display = 'block';
                limitNotice.style.display = 'none';
            }
        }

        // ===== 招待リンク生成 =====
        async function addGuest() {
            const guestName = document.getElementById('input-guest-name').value.trim();
            const errEl = document.getElementById('add-error');
            errEl.style.display = 'none';

            if (!guestName) {
                errEl.textContent = 'ゲストの名前を入力してください。';
                errEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('btn-add-guest');
            btn.disabled = true;
            btn.textContent = '生成中...';

            try {
                const res = await fetch('/api/student/generate-links', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${studentToken}`
                    },
                    body: JSON.stringify({ guest_name: guestName })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('input-guest-name').value = '';
                    await loadDashboard();
                } else {
                    errEl.textContent = data.message || '生成に失敗しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '招待リンクを生成';
            }
        }

        // ===== 枠の譲渡 =====
        async function issueTransfer(slotId) {
            if (!confirm('この枠の譲渡コードを発行しますか？\nコードを受け取った人がこの枠を使えるようになります。')) return;
            try {
                const res = await fetch(`/api/student/guest-slots/${slotId}/transfer`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${studentToken}` }
                });
                const data = await res.json();
                if (res.ok) {
                    showNotification(`譲渡コード「${data.transfer_code}」を発行しました`, 'success');
                    await loadDashboard();
                } else {
                    showNotification(data.message || '発行に失敗しました', 'error');
                }
            } catch (e) {
                showNotification('通信エラーが発生しました', 'error');
            }
        }

        async function cancelTransfer(slotId) {
            if (!confirm('譲渡コードをキャンセルしますか？')) return;
            try {
                const res = await fetch(`/api/student/guest-slots/${slotId}/transfer`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${studentToken}` }
                });
                const data = await res.json();
                if (res.ok) {
                    showNotification('譲渡をキャンセルしました', 'success');
                    await loadDashboard();
                } else {
                    showNotification(data.message || 'キャンセルに失敗しました', 'error');
                }
            } catch (e) {
                showNotification('通信エラーが発生しました', 'error');
            }
        }

        async function claimSlot() {
            const code = document.getElementById('claim-code-input').value.trim().toUpperCase();
            const errEl = document.getElementById('claim-error');
            errEl.style.display = 'none';
            if (!code) { errEl.textContent = '譲渡コードを入力してください。'; errEl.style.display = 'block'; return; }
            try {
                const res = await fetch('/api/student/claim-slot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${studentToken}` },
                    body: JSON.stringify({ transfer_code: code })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('claim-code-input').value = '';
                    showNotification('枠を受け取りました！ゲストの名前を設定してください', 'success');
                    await loadDashboard();
                } else {
                    errEl.textContent = data.message || '受け取りに失敗しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
            }
        }

        // ===== 名前編集 =====
        function editGuestName(id, currentName) {
            _editNameSlotId = id;
            _editNameCurrent = currentName;
            const input = document.getElementById('edit-name-input');
            const errEl = document.getElementById('edit-name-error');
            input.value = currentName;
            errEl.style.display = 'none';
            document.getElementById('edit-name-modal').classList.add('is-active');
            setTimeout(() => { input.focus(); input.select(); }, 50);
        }

        function closeEditNameModal() {
            document.getElementById('edit-name-modal').classList.remove('is-active');
            _editNameSlotId = null;
        }

        async function confirmEditGuestName() {
            const input = document.getElementById('edit-name-input');
            const errEl = document.getElementById('edit-name-error');
            const btn = document.getElementById('edit-name-confirm-btn');
            const newName = input.value.trim();

            if (!newName) {
                errEl.textContent = '名前を入力してください。';
                errEl.style.display = 'block';
                return;
            }
            if (newName === _editNameCurrent) {
                closeEditNameModal();
                return;
            }

            btn.disabled = true;
            btn.textContent = '更新中...';
            try {
                const res = await fetch(`/api/student/guest-slots/${_editNameSlotId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${studentToken}`
                    },
                    body: JSON.stringify({ guest_name: newName })
                });
                const data = await res.json();
                if (res.ok) {
                    closeEditNameModal();
                    showNotification('名前を変更しました', 'success');
                    await loadDashboard();
                } else {
                    errEl.textContent = data.message || '更新に失敗しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                errEl.textContent = 'サーバーエラーが発生しました。';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '変更する';
            }
        }

        function createMessage(url, guestName) {
            return `梨花祭にご招待します！ ${guestName} 様の入場チケットはこちらです。\n\n【入場用URL】\n${url}\n\n当日は上記リンクを開くと入場用QRコードが表示されます。受付でQRコードをご提示ください。`;
        }

        // ===== コピー =====
        async function copyTransferCode(code) {
            try {
                await navigator.clipboard.writeText(code);
                showNotification(`譲渡コード「${code}」をコピーしました`, 'success');
            } catch (e) {
                prompt('以下のコードをコピーしてください:', code);
            }
        }

        async function copyLink(url, idx, guestName) {
            try {
                await navigator.clipboard.writeText(url);
                const btn = document.getElementById(`copy-btn-${idx}`);
                if (btn) {
                    btn.textContent = 'コピー済み！';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
                }
            } catch (e) {
                prompt('以下のURLをコピーしてください:', url);
            }
        }

        function shareLine(url, guestName) {
            const text = createMessage(url, guestName);
            const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
            window.open(lineUrl, '_blank');
        }

        // Enterキーでゲスト名変更モーダルを確定、Escapeで閉じる
        document.getElementById('edit-name-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') confirmEditGuestName();
            else if (e.key === 'Escape') closeEditNameModal();
        });

        // ===== ユーティリティ =====
        function showNotification(message, type = 'success') {
            // 表示済みのものを消去（重ならないようにする）
            document.querySelectorAll('.notification').forEach(el => el.remove());

            const div = document.createElement('div');
            div.className = `notification is-${type}`;
            div.textContent = message;
            document.body.appendChild(div);
            setTimeout(() => {
                if (div.parentNode) div.parentNode.removeChild(div);
            }, 3000);
        }

        function backToForm() {
            document.getElementById('step-otp').style.display = 'none';
            document.querySelector('.tab-bar').style.display = 'flex';
            switchTab(currentTab);
        }

        function setLoading(on) {
            document.getElementById('step-loading').style.display = on ? 'block' : 'none';
            if (on) {
                document.getElementById('form-login').style.display = 'none';
                document.getElementById('form-register').style.display = 'none';
                document.getElementById('step-otp').style.display = 'none';
            } else {
                if (document.getElementById('step-otp').style.display === 'none' && document.getElementById('page-dashboard').style.display === 'none') {
                    document.getElementById('form-login').style.display = currentTab === 'login' ? 'block' : 'none';
                    document.getElementById('form-register').style.display = currentTab === 'register' ? 'block' : 'none';
                }
            }
        }

        function logout() {
            localStorage.removeItem('student_token');
            localStorage.removeItem('student_email');
            studentToken = '';
            document.getElementById('page-dashboard').style.display = 'none';
            document.getElementById('page-login').style.display = 'block';
            document.querySelector('.tab-bar').style.display = 'flex';
            switchTab('login');
            setLoading(false);
        }

        // 学校メールのローカル部は必ず英字始まり（生徒 g/r/b+数字, 職員 m_fujii 等）。
        // 接頭辞を付け忘れた数字だけのアドレス（例: 2026330@...）は存在せずバウンスするため弾く。
        function isValidSchoolEmail(email) {
            return /^[a-zA-Z]/.test(email.trim());
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>

    <footer style="text-align: center; margin-top: 2rem; padding: 1rem;">
        <p style="color: var(--color-text-sub); font-size: 12px;">&copy; 2026 千葉英和高校生徒会</p>
    </footer>
</body>

</html>
